training:
  total_timesteps: 2000000
  n_envs: 1  # Limité à 1 environnement parallèle pour ne pas saturer les 2 Go de VRAM avec les buffers d'observations
  
  domain_randomization:
    enabled: true
    capital_variation_pct: 0.20
    fee_range: [0.0005, 0.0015]

  # SAC Hyperparameters
  sac:
    learning_rate: "linear_0.0007"   # Linear decay from 7e-4 → 0
    buffer_size: 300000              # Maintien d'un grand buffer dans la RAM (CPU) pour la diversité
    batch_size: 64                   # Crucial : Réduit à 64 pour que les calculs de gradients du gros réseau tiennent dans 2Go de VRAM
    gamma: 0.99
    tau: 0.005
    train_freq: 1
    gradient_steps: 1
    ent_coef: "auto_0.01"            # Auto-tuned with floor at 0.01 (prevents exploration collapse)
    target_entropy: "auto"
    policy_kwargs:
      net_arch: [1024, 1024, 512]    # Deeper network for complex market patterns
    
  ppo:
    learning_rate: 0.0003            # Constant learning rate for stability
    n_steps: 2048                    # Réduit légèrement pour éviter de faire exploser la RAM lors de la collecte avec ce gros réseau
    batch_size: 128                  # Reduced to fit 2Go VRAM with larger lookback window (60)
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.01
    policy_kwargs:
      net_arch: [256, 256]           # Medium-sized network to prevent overfitting on 1m noise

data:
  lookback_window: 60               # 60 candles at 1m = 1h of context
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15

market:
  exchange: binance
  pairs:
    - BTC/USDT
  timeframe: 1m
  history_years: 1

fees:
  maker: 0.001
  taker: 0.001

action:
  dead_zone: 0.05
  cooldown_steps: 0
  max_position_pct: 0.25            # Max 25% of capital per single trade

observation:
  features:
    - rsi
    - macd
    - atr
    - bollinger
    - obv
    - adx
    - cci
    - sma
    - ema
    - log_return
    - volatility
  
  multi_timeframe:
    enabled: true
    source_tf: "1m"
    target_tfs: ["5m", "15m", "1h"]  # Adjusted for 1m base timeframe
    features: ["rsi", "ema_200_direction", "atr"]

  sentiment:
    fear_and_greed: true

reward:
  fee_penalty_weight: 1.0
  volatility_penalty: 0.1
  unrealized_pnl_weight: 0.1        # Reward agent for holding winning positions
  reward_scale: 100.0               # Scale rewards to avoid very large cumulative values
  drawdown_penalty:
    enabled: true
    threshold_pct: 0.03             # Trigger at 3% drawdown (was 5%)
    penalty_factor: 5.0             # Stronger penalty (was 2.0)
  sharpe_bonus:
    enabled: true
    window: 100
    weight: 0.01
  trend_alignment_bonus:
    enabled: true
    weight: 0.005

paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  models: "models"
  logs: "logs"
